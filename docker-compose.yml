version: "3.9"
networks:
  labelstudio_shared:
    external: true
services:
  nginx:
    # build: .
    image: label-studio:latest
    container_name: ls_nginx
    restart: unless-stopped
    ports:
      - "8080:8085"
      - "8081:8086"
    depends_on:
      - app
    networks:
      - labelstudio_shared
    environment:
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
      # - LABEL_STUDIO_HOST=ls_nginx:8085
    #   Optional: Specify SSL termination certificate & key
    #   Just drop your cert.pem and cert.key into folder 'deploy/nginx/certs'
    #      - NGINX_SSL_CERT=/certs/cert.pem
    #      - NGINX_SSL_CERT_KEY=/certs/cert.key
    volumes:
      - ./mydata:/label-studio/data:rw
      - ./deploy/nginx/certs:/certs:ro
      # USER CONFIG: Change /home/pc2041/YOUR_IMAGES_HERE to your images folder
      # - /home/pc2041/YOUR_IMAGES_HERE:/label-studio/files:ro
      - /media/pc2041/Elements/Eureka_2023_25mm/DSLR_25mm/20230902:/label-studio/files:ro
    #   Optional: Override nginx default conf
    #      - ./deploy/my.conf:/etc/nginx/nginx.conf
    command: nginx

  app:
    stdin_open: true
    tty: true
    build:
      context: .
      dockerfile: Dockerfile
    image: label-studio:latest
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - labelstudio_shared
    depends_on:
      - db
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=postgres
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=db
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
      # - LABEL_STUDIO_HOST=ls_nginx:8085
      - JSON_LOG=1
      # Local file serving configuration
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    #      - LOG_LEVEL=DEBUG
    volumes:
      - ./mydata:/label-studio/data:rw
      # USER CONFIG: Change /home/pc2041/YOUR_IMAGES_HERE to your images folder
      # Then in Label Studio UI, use /label-studio/files as "Absolute local path"
      # - /home/pc2041/YOUR_IMAGES_HERE:/label-studio/files:ro
      - /media/pc2041/Elements/Eureka_2023_25mm/DSLR_25mm/20230902:/label-studio/files:ro
    command: label-studio-uwsgi

  db:
    image: pgautoupgrade/pgautoupgrade:13-alpine
    hostname: db
    restart: unless-stopped
    networks:
      - labelstudio_shared
    # Optional: Enable TLS on PostgreSQL
    # Just drop your server.crt and server.key into folder 'deploy/pgsql/certs'
    # NOTE: Both files must have permissions u=rw (0600) or less
    #    command: >
    #      -c ssl=on
    #      -c ssl_cert_file=/var/lib/postgresql/certs/server.crt
    #      -c ssl_key_file=/var/lib/postgresql/certs/server.key
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
      - ./deploy/pgsql/certs:/var/lib/postgresql/certs:ro